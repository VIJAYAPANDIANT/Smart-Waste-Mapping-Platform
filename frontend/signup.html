<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up - SmartWaste</title>
    <link rel="stylesheet" href="style.css">
    <script>
        // Redirect to home if already logged in
        if (localStorage.getItem('user')) {
             window.location.href = 'index.html';
        }
    </script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <script src="ui-utils.js"></script>
</head>
<body class="dark-theme">
    <nav>
        <div class="nav-container">
            <a href="index.html" class="logo">
                <i class="fas fa-recycle"></i> Smart<span>Waste</span>
            </a>
        </div>
    </nav>

    <main class="auth-container">
        <div class="auth-card">
            <h2>Create Account</h2>
            <p>Join the community to track and report waste</p>
            
            <form id="signupForm">
                <div class="input-group">
                    <label for="username">Username</label>
                    <input type="text" id="username" required placeholder="Choose a username">
                </div>
                <div class="input-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" required placeholder="Enter your email">
                </div>
                <div class="input-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" required placeholder="Create a password">
                </div>
                <button type="submit" class="btn btn-primary btn-block">Sign Up</button>
            </form>
            
            <p class="auth-footer">
                Already have an account? <a href="login.html">Login</a>
            </p>
            <div id="message" class="message"></div>
        </div>
    </main>

    <script>
        document.getElementById('signupForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const username = document.getElementById('username').value;
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const messageDiv = document.getElementById('message');

            try {
                const response = await fetch('/signup', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, email, password })
                });

                const data = await response.json();

                if (response.ok) {
                    showToast('Account created! Logging you in...');
                    localStorage.setItem('user', JSON.stringify(data.user));
                    setTimeout(() => window.location.href = 'index.html', 1500);
                } else {
                    showToast(data.error || 'Signup failed', 'error');
                }
            } catch (error) {
                showToast('Connection error', 'error');
            }
        });
    </script>
</body>
</html>
